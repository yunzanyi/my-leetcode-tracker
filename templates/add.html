{% extends 'base.html' %}
{% block content %}
{% if edit %}
<h2>✏️ 修改题目</h2>
{% else %}
<h2>➕ 添加已刷LeetCode题目</h2>
{% endif %}

<form method="POST">
    <div class="row g-3">
        <div class="col-md-2"><input type="text" name="num" class="form-control" value="{{ problem.num if problem else '' }}" placeholder="题号" required></div>
        <div class="col-md-5"><input type="text" name="title" class="form-control" value="{{ problem.title if problem else '' }}" placeholder="题目标题" required></div>
        <div class="col-md-2">
            <select name="difficulty" class="form-control" required>
                <option value="Easy" {% if problem and problem.difficulty == 'Easy' %}selected{% endif %}>Easy</option>
                <option value="Medium" {% if problem and problem.difficulty == 'Medium' %}selected{% endif %}>Medium</option>
                <option value="Hard" {% if problem and problem.difficulty == 'Hard' %}selected{% endif %}>Hard</option>
            </select>
        </div>
        <div class="col-md-3"><input type="text" name="tags" class="form-control" value="{{ problem.tags if problem else '' }}" placeholder="标签（逗号分隔）"></div>
    </div>
    
    <div class="mt-3">
        <label>题目描述 / 笔记</label>
        <textarea name="description" class="form-control" rows="3">{{ problem.description if problem else '' }}</textarea>
    </div>
    
    <div class="mt-3">
        <label>我的解法代码（Python）</label>
        <textarea name="code" class="form-control" rows="8">{{ problem.code if problem else '' }}</textarea>
    </div>
    
    <div class="row g-3 mt-3">
        <div class="col-md-4"><input type="date" name="date" class="form-control" value="{{ today }}" required></div>
        <div class="col-md-3"><input type="number" name="time_spent" class="form-control" value="{{ problem.time_spent if problem else 20 }}" required> 分钟</div>
    </div>
    
    <button type="submit" class="btn btn-primary mt-4">{% if edit %}✅ 保存修改{% else %}✅ 确认添加{% endif %}</button>
    <a href=" " class="btn btn-secondary mt-4">返回列表</a >
</form>
{% endblock %}
